<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapbox – Local vs Remote Tiles</title>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
    }

    header h1 { font-size: 1.1rem; }

    #token-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #token-bar input {
      padding: 5px 10px;
      border-radius: 4px;
      border: none;
      width: 320px;
      font-size: 0.85rem;
    }

    #token-bar button {
      padding: 5px 14px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    #maps-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .map-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #0f3460;
    }

    .map-panel:last-child { border-right: none; }

    .map-label {
      background: #0f3460;
      text-align: center;
      padding: 6px;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .map-container { flex: 1; }

    #stats {
      background: #16213e;
      padding: 8px 20px;
      display: flex;
      gap: 30px;
      font-size: 0.82rem;
      border-top: 1px solid #0f3460;
    }

    .stat-item span { color: #e94560; font-weight: bold; }

    #log {
      background: #0d0d1a;
      padding: 6px 20px;
      font-size: 0.75rem;
      color: #7f8c8d;
      height: 28px;
      overflow: hidden;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <h1>🗺️ Mapbox – Local vs Remote Tile Performance Test</h1>
  <div id="token-bar">
    <input id="mb-token" type="text" placeholder="Enter your Mapbox public token (pk.eyJ1…)" />
    <button onclick="initMaps()">Load Maps</button>
  </div>
</header>

<div id="maps-wrapper">
  <div class="map-panel">
    <div class="map-label">🌐 Remote Tiles (Mapbox CDN)</div>
    <div id="map-remote" class="map-container"></div>
  </div>
  <div class="map-panel">
    <div class="map-label">💾 Local Tiles (localhost server)</div>
    <div id="map-local" class="map-container"></div>
  </div>
</div>

<div id="stats">
  <div class="stat-item">Remote load time: <span id="remote-time">—</span> ms</div>
  <div class="stat-item">Local load time:  <span id="local-time">—</span>  ms</div>
  <div class="stat-item">Remote tiles loaded: <span id="remote-tiles">0</span></div>
  <div class="stat-item">Local tiles loaded:  <span id="local-tiles">0</span></div>
</div>

<div id="log">Waiting for maps to load…</div>

<script src="src/map.js"></script>
</body>
</html>
